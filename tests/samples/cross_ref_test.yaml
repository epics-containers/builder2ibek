# yaml-language-server: $schema=/epics/ibek-defs/ioc.schema.json

ioc_name: "{{  _global.get_env('IOC_NAME') }}"

description: auto-generated by https://github.com/epics-containers/builder2ibek

entities:

  - type: epics.EpicsEnvSet
    name: EPICS_TZ
    value: GMT0BST

  - type: epics.EpicsEnvSet
    name: STREAM_PROTOCOL_PATH
    value: /epics/runtime/protocol/

  - type: devIocStats.iocAdminSoft
    IOC: '{{ ioc_name | upper }}'

  - type: epics.EpicsCaMaxArrayBytes

  - type: pmac.pmacAsynSSHPort
    IP: 10.0.0.0
    PASSWORD: pytest
    name: PPMAC01_PORT

  - type: pmac.PowerPMAC
    P: BL999-MO-PPMAC-01
    name: PPMAC01
    pmacAsynSSHPort: PPMAC01_PORT

  - type: pmac.dls_pmac_asyn_motor
    ACCL: 0.1
    ADDR: '{{ JAR | int }}'
    BACC: 0.5
    BVEL: 0.2
    Controller: PPMAC01
    DESC: '{{ M | string }}'
    DHLM: 1.1
    DIR: Pos
    DLLM: -41
    EGU: mm
    ERES: '{{ MRES | float }}'
    HOME: '012345'
    HOMEVIS: '{{ JAR | int }}'
    JAR: 1
    M: :Y
    MRES: 0.0001
    P: '{{ HOME | string }}'
    PREC: 4
    SREV: 200
    VELO: 2.5
    VMAX: '{{ VELO | float }}'
